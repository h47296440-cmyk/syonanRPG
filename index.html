<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Project: Chronicles of the Future</title>
    
    <!-- CSSでゲーム画面の比率を固定する工夫 -->
    <style>
        :root {
            --bg-color: #1a1a1a;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* ロード中に表示するテキスト */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- ゲーム描画用エリア -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- ゲーム読み込み待機用メッセージ -->
        <div id="loading">Now Loading...</div>
    </div>

    <!-- ゲームのメインスクリプト（TypeScript/JavaScript） -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
